name: massion

services:
  volume-init:
    image: busybox:1.37.0
    command: ["chown", "-R", "1000:1000", "/backups", "/var/lib/massion"]
    restart: "no"
    network_mode: none
    volumes:
      - backup-data:/backups
      - massion-data:/var/lib/massion
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER

  surrealdb:
    build:
      context: .
      dockerfile: deploy/surreal/Dockerfile
    image: massion-surrealdb:3.2.0
    restart: unless-stopped
    environment:
      SURREAL_PASSWORD_FILE: /run/secrets/database_password
      SURREAL_USER: root
      SURREAL_LOG: info
    secrets:
      - database_password
    volumes:
      - surreal-data:/data
    networks:
      backend:
        ipv4_address: 172.28.0.30
    healthcheck:
      test: ["CMD", "/usr/local/bin/surreal", "is-ready", "--endpoint", "http://127.0.0.1:8000"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  massion:
    build:
      context: .
      dockerfile: Dockerfile
    image: massion:1.0.0
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      surrealdb:
        condition: service_healthy
        restart: true
    environment:
      MASSION_MODE: team
      MASSION_DATABASE_URL: ws://surrealdb:8000/rpc
      MASSION_DATABASE_NAMESPACE: massion
      MASSION_DATABASE_NAME: massion
      MASSION_DATABASE_USER: root
      MASSION_DATABASE_PASSWORD_FILE: /run/secrets/database_password
      MASSION_TOKEN_KEY_FILE: /run/secrets/token_key
      MASSION_HTTP_HOST: 0.0.0.0
      MASSION_HTTP_PORT: "3141"
      MASSION_METRICS_HOST: 0.0.0.0
      MASSION_METRICS_PORT: "9464"
      MASSION_TRUSTED_PROXIES: 172.28.0.10,::ffff:172.28.0.10
    secrets:
      - database_password
      - token_key
    volumes:
      - massion-data:/var/lib/massion
      - backup-data:/backups
    networks:
      backend:
        ipv4_address: 172.28.0.20
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3141/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    image: massion-caddy:2.11.4
    restart: unless-stopped
    depends_on:
      massion:
        condition: service_healthy
        restart: true
    environment:
      MASSION_DOMAIN: ${MASSION_DOMAIN:-localhost}
    secrets:
      - tls_certificate
      - tls_private_key
    ports:
      - "${MASSION_HTTPS_PORT:-443}:443"
    networks:
      backend:
        ipv4_address: 172.28.0.10
      edge:
    read_only: true
    tmpfs:
      - /config:size=16m,mode=0700
      - /data:size=32m,mode=0700
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  edge:
  backend:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  backup-data:
  massion-data:
  surreal-data:

secrets:
  database_password:
    file: ${MASSION_DATABASE_PASSWORD_FILE:-./deploy/secrets/database-password}
  token_key:
    file: ${MASSION_TOKEN_KEY_FILE:-./deploy/secrets/token-key}
  tls_certificate:
    file: ${MASSION_TLS_CERTIFICATE_FILE:-./deploy/secrets/tls.crt}
  tls_private_key:
    file: ${MASSION_TLS_PRIVATE_KEY_FILE:-./deploy/secrets/tls.key}
