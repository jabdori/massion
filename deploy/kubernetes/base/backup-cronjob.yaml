apiVersion: batch/v1
kind: CronJob
metadata:
  name: massion-backup
spec:
  schedule: "17 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: massion-backup
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: prepare-secrets
              image: busybox:1.37.0
              command:
                - sh
                - -ec
                - cp /source/database-password /target/database-password && cp /source/token-key /target/token-key && chown 1000:1000 /target/* && chmod 0600 /target/*
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                  add: ["CHOWN", "FOWNER"]
              volumeMounts:
                - name: raw-secrets
                  mountPath: /source
                  readOnly: true
                - name: runtime-secrets
                  mountPath: /target
          containers:
            - name: backup
              image: massion:1.0.0
              command: ["/usr/bin/dumb-init", "--", "/bin/sh", "-ec"]
              args:
                - node dist/main.js backup "/backups/massion-$(date -u +%Y%m%dT%H%M%SZ).json"; find /backups -type f -name 'massion-*.json' -mtime +30 -delete
              envFrom:
                - configMapRef:
                    name: massion-config
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: runtime-secrets
                  mountPath: /run/massion-secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: massion-backups
            - name: raw-secrets
              secret:
                secretName: massion-secrets
            - name: runtime-secrets
              emptyDir:
                medium: Memory
                sizeLimit: 1Mi
            - name: tmp
              emptyDir:
                sizeLimit: 128Mi
