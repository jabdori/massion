apiVersion: apps/v1
kind: Deployment
metadata:
  name: massion
spec:
  replicas: 2
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: massion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: massion
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-secrets
          image: busybox:1.37.0
          command:
            - sh
            - -ec
            - cp /source/database-password /target/database-password && cp /source/token-key /target/token-key && cp /source/tls.crt /target/tls_certificate && cp /source/tls.key /target/tls_private_key && chown 1000:1000 /target/* && chmod 0600 /target/*
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          volumeMounts:
            - name: raw-secrets
              mountPath: /source
              readOnly: true
            - name: runtime-secrets
              mountPath: /target
      containers:
        - name: massion
          image: massion:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: massion-config
          ports:
            - name: api
              containerPort: 3141
            - name: metrics
              containerPort: 9464
          startupProbe:
            httpGet:
              path: /health/ready
              port: api
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health/ready
              port: api
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: api
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime-secrets
              mountPath: /run/massion-secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
        - name: caddy
          image: massion-caddy:2.11.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: massion-config
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: caddy-config
              mountPath: /config
            - name: caddy-data
              mountPath: /data
            - name: caddy-tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 45
      volumes:
        - name: raw-secrets
          secret:
            secretName: massion-secrets
        - name: runtime-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 2Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        - name: caddy-config
          emptyDir:
            sizeLimit: 32Mi
        - name: caddy-data
          emptyDir:
            sizeLimit: 64Mi
        - name: caddy-tmp
          emptyDir:
            sizeLimit: 32Mi
