apiVersion: apps/v1
kind: Deployment
metadata:
  name: massion
spec:
  replicas: 1
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: massion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: massion
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-secrets
          image: busybox:1.37.0
          command:
            - sh
            - -ec
            - cp /source/database-password /app/database-password && cp /source/token-key /app/token-key && cp /source/credential-key /app/credential-key && cp /source/registry-key /app/registry-key && cp /source/tls.crt /tls/tls_certificate && cp /source/tls.key /tls/tls_private_key && cp /source/database-owner-password /provision/database-owner-password && cp /source/database-password /provision/database-password && chown 1000:1000 /app/* /tls/* /provision/* && chmod 0600 /app/* /tls/* /provision/*
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          volumeMounts:
            - name: raw-secrets
              mountPath: /source
              readOnly: true
            - name: app-secrets
              mountPath: /app
            - name: tls-secrets
              mountPath: /tls
            - name: provision-secrets
              mountPath: /provision
        - name: provision-database
          image: massion:1.0.0
          command: ["/usr/bin/dumb-init", "--", "node", "dist/main.js", "provision"]
          env:
            - name: MASSION_DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: massion-config
                  key: MASSION_DATABASE_URL
            - name: MASSION_DATABASE_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: massion-config
                  key: MASSION_DATABASE_NAMESPACE
            - name: MASSION_DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: massion-config
                  key: MASSION_DATABASE_NAME
            - name: MASSION_DATABASE_PROVISION_USER
              value: root
            - name: MASSION_DATABASE_PROVISION_PASSWORD_FILE
              value: /run/provision-secrets/database-owner-password
            - name: MASSION_DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: massion-config
                  key: MASSION_DATABASE_USER
            - name: MASSION_DATABASE_PASSWORD_FILE
              value: /run/provision-secrets/database-password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provision-secrets
              mountPath: /run/provision-secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      containers:
        - name: massion
          image: massion:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: massion-config
          ports:
            - name: api
              containerPort: 3141
            - name: metrics
              containerPort: 9464
            - name: registry
              containerPort: 3142
          startupProbe:
            httpGet:
              path: /health/ready
              port: api
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health/ready
              port: api
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: api
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-secrets
              mountPath: /run/massion-secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: massion-data
              mountPath: /var/lib/massion
        - name: caddy
          image: massion-caddy:2.11.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: massion-config
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            tcpSocket:
              port: https
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: caddy-config
              mountPath: /config
            - name: caddy-data
              mountPath: /data
            - name: caddy-tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 45
      volumes:
        - name: raw-secrets
          secret:
            secretName: massion-secrets
        - name: app-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 2Mi
        - name: tls-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: provision-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        - name: massion-data
          persistentVolumeClaim:
            claimName: massion-data
        - name: caddy-config
          emptyDir:
            sizeLimit: 32Mi
        - name: caddy-data
          emptyDir:
            sizeLimit: 64Mi
        - name: caddy-tmp
          emptyDir:
            sizeLimit: 32Mi
