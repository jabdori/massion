apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
    spec:
      serviceAccountName: default
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-secret
          image: busybox:1.37.0
          command:
            - sh
            - -ec
            - cp /source/database-owner-password /target/database-owner-password && chown 10001:10001 /target/database-owner-password && chmod 0600 /target/database-owner-password
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          volumeMounts:
            - name: raw-secrets
              mountPath: /source
              readOnly: true
            - name: runtime-secrets
              mountPath: /target
      containers:
        - name: surrealdb
          image: massion-surrealdb:3.2.1
          imagePullPolicy: IfNotPresent
          env:
            - name: SURREAL_PASSWORD_FILE
              value: /run/massion-secrets/database-owner-password
            - name: SURREAL_USER
              value: root
            - name: SURREAL_LOG
              value: info
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            exec:
              command: ["/usr/local/bin/surreal", "is-ready", "--endpoint", "http://127.0.0.1:8000"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            exec:
              command: ["/usr/local/bin/surreal", "is-ready", "--endpoint", "http://127.0.0.1:8000"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["/usr/local/bin/surreal", "is-ready", "--endpoint", "http://127.0.0.1:8000"]
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: runtime-secrets
              mountPath: /run/massion-secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      terminationGracePeriodSeconds: 60
      volumes:
        - name: raw-secrets
          secret:
            secretName: massion-secrets
            items:
              - key: database-owner-password
                path: database-owner-password
        - name: runtime-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
