apiVersion: batch/v1
kind: Job
metadata:
  name: massion-restore
  namespace: massion
  labels:
    app.kubernetes.io/name: massion-restore
    app.kubernetes.io/component: backup
spec:
  suspend: true
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: massion-restore
        app.kubernetes.io/component: backup
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-secrets
          image: busybox:1.37.0
          command:
            - sh
            - -ec
            - cp /source/database-password /target/database-password && cp /source/token-key /target/token-key && chown 1000:1000 /target/* && chmod 0600 /target/*
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          volumeMounts:
            - name: raw-secrets
              mountPath: /source
              readOnly: true
            - name: runtime-secrets
              mountPath: /target
      containers:
        - name: restore
          image: massion:1.0.0
          command: ["/usr/bin/dumb-init", "--", "node", "dist/main.js", "restore", "/backups/REPLACE_BACKUP.json"]
          envFrom:
            - configMapRef:
                name: massion-config
          env:
            - name: MASSION_DATABASE_NAME
              value: REPLACE_CLEAN_DATABASE_NAME
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: backups
              mountPath: /backups
            - name: runtime-secrets
              mountPath: /run/massion-secrets
              readOnly: true
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: massion-backups
        - name: runtime-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: raw-secrets
          secret:
            secretName: massion-secrets
