apiVersion: v1
kind: Secret
metadata:
  name: massion-secrets
  namespace: massion
type: Opaque
stringData:
  database-password: REPLACE_WITH_AT_LEAST_16_RANDOM_CHARACTERS
  token-key: REPLACE_WITH_BASE64URL_32_BYTE_KEY
  tls.crt: REPLACE_WITH_PEM_CERTIFICATE_CHAIN
  tls.key: REPLACE_WITH_PEM_PRIVATE_KEY
